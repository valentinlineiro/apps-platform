services:
  backend:
    build: ./apps/backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped
  frontend:
    build: ./apps/frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
