# Parent orchestration compose for the platform while apps are being split
# into separate repositories.
services:
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    depends_on:
      - portal-backend
      - exam-corrector-backend
      - aneca-advisor-backend
    restart: unless-stopped

  portal-backend:
    build:
      context: .
      dockerfile: apps/portal/backend/Dockerfile
    expose:
      - "5000"
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - PORTAL_SESSION_SECRET=${PORTAL_SESSION_SECRET:-dev-portal-session-secret}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - OAUTH_PROVIDER=keycloak
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-portal}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-portal-dev-secret}
      - OAUTH_SCOPE=openid profile email
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-https://localhost/auth/callback}
      - OAUTH_AUTHORIZE_URL=${OAUTH_AUTHORIZE_URL:-https://localhost/realms/apps-platform/protocol/openid-connect/auth}
      - OAUTH_TOKEN_URL=${OAUTH_TOKEN_URL:-http://keycloak:8080/realms/apps-platform/protocol/openid-connect/token}
      - OAUTH_USERINFO_URL=${OAUTH_USERINFO_URL:-http://keycloak:8080/realms/apps-platform/protocol/openid-connect/userinfo}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-keycloak}:${POSTGRES_PASSWORD:-keycloak}@postgres:5432/portal
    restart: unless-stopped

  exam-corrector-backend:
    build:
      context: .
      dockerfile: apps/exam-corrector/backend/Dockerfile
    expose:
      - "8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:4200
      - PORTAL_BACKEND_URL=http://portal-backend:5000
    volumes:
      - exam_corrector_uploads:/app/uploads
    depends_on:
      - portal-backend
    restart: unless-stopped

  aneca-advisor-backend:
    build:
      context: .
      dockerfile: apps/aneca-advisor/backend/Dockerfile
    expose:
      - "5001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-keycloak}:${POSTGRES_PASSWORD:-keycloak}@postgres:5432/portal
      - PORTAL_BACKEND_URL=http://portal-backend:5000
    depends_on:
      postgres:
        condition: service_healthy
      portal-backend:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${POSTGRES_USER:-keycloak}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/portal/backend/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.2
    command: ["start-dev", "--import-realm"]
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME=https://localhost
      - KC_PROXY=edge
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=${POSTGRES_USER:-keycloak}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-keycloak}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/portal/backend/keycloak:/opt/keycloak/data/import:ro
      - ./apps/portal/backend/keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/apps-platform HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  caddy:
    image: caddy:2.7-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=localhost
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - portal
      - keycloak
    restart: unless-stopped

volumes:
  exam_corrector_uploads:
  postgres_data:
  caddy_data:
  caddy_config:
