services:
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - exam-corrector-backend
    restart: unless-stopped

  exam-corrector-backend:
    build: ./apps/exam-corrector/backend
    expose:
      - "8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:4200
    volumes:
      - exam_corrector_uploads:/app/uploads
    restart: unless-stopped

  # attendance-checker-backend:   # uncomment when backend is added
  #   build: ./apps/attendance-checker/backend
  #   expose:
  #     - "8000"
  #   restart: unless-stopped

volumes:
  exam_corrector_uploads:
