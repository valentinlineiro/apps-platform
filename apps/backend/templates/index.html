<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #141414; --border: #222;
    --text: #e8e8e8; --muted: #555; --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.08);
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 14px; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.6;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }
  .layout { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 60px 24px 80px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 56px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .header-left h1 { font-family: var(--mono); font-weight: 400; font-size: 1.1rem; letter-spacing: 0.02em; }
  .header-left h1 span { color: var(--accent); }
  .header-meta { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; margin-top: 4px; }
  .status-bar { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .section-label { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 48px; }
  .card { background: var(--surface); padding: 24px; text-decoration: none; color: var(--text); display: flex; flex-direction: column; gap: 12px; transition: background 0.15s; position: relative; }
  .card:hover { background: var(--accent-dim); }
  .card:hover .card-arrow { transform: translate(3px,-3px); color: var(--accent); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; }
  .card-icon { font-size: 1.4rem; line-height: 1; }
  .card-arrow { font-size: 1rem; color: var(--muted); transition: transform 0.15s, color 0.15s; font-family: var(--mono); }
  .card-name { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.02em; }
  .card-desc { font-size: 0.8rem; color: #888; line-height: 1.5; font-weight: 300; }
  .card-footer { display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 8px; flex-wrap: wrap; }
  .tag { font-family: var(--mono); font-size: 0.65rem; padding: 2px 7px; border-radius: 2px; letter-spacing: 0.05em; }
  .tag-active { background: rgba(200,241,53,0.12); color: var(--accent); border: 1px solid rgba(200,241,53,0.2); }
  .tag-wip { background: rgba(255,180,0,0.1); color: #ffb400; border: 1px solid rgba(255,180,0,0.2); }
  .tag-tech { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .card-add { background: transparent; border: 1px dashed var(--border); cursor: default; align-items: center; justify-content: center; min-height: 140px; gap: 8px; }
  .card-add:hover { background: rgba(255,255,255,0.02); }
  .card-add-icon { font-family: var(--mono); font-size: 1.5rem; color: var(--muted); }
  .card-add-label { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; }
  footer { border-top: 1px solid var(--border); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
  .footer-info { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); line-height: 1.8; }
  .footer-info span { color: #444; }
  .card { opacity: 0; transform: translateY(8px); animation: fadeUp 0.4s ease forwards; }
  .card:nth-child(1){animation-delay:0.05s} .card:nth-child(2){animation-delay:0.10s}
  .card:nth-child(3){animation-delay:0.15s} .card:nth-child(4){animation-delay:0.20s}
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="layout">
  <header>
    <div class="header-left">
      <h1>~/apps<span>_</span></h1>
      <p class="header-meta" id="datetime"></p>
    </div>
    <div class="status-bar">
      <span class="status-dot"></span>
      <span>online</span>
    </div>
  </header>

  <p class="section-label">// deployed</p>

  <div class="grid">

    <a class="card" href="/exam-corrector/">
      <div class="card-header">
        <span class="card-icon">📋</span>
        <span class="card-arrow">↗</span>
      </div>
      <div class="card-name">exam-corrector</div>
      <div class="card-desc">Corrección automática de exámenes tipo test con detección de burbujas.</div>
      <div class="card-footer">
        <span class="tag tag-active">activo</span>
        <span class="tag tag-tech">flask</span>
        <span class="tag tag-tech">opencv</span>
      </div>
    </a>

    <!-- ADD NEW -->
    <div class="card card-add">
      <span class="card-add-icon">+</span>
      <span class="card-add-label">nueva app</span>
    </div>

  </div>

  <footer>
    <div class="footer-info">
      <div>nginx <span>/</span> docker compose</div>
      <div>hetzner cx23</div>
    </div>
  </footer>
</div>
<script>
  function updateTime() {
    const now = new Date();
    document.getElementById('datetime').textContent =
      now.toISOString().replace('T',' ').substring(0,19) + ' UTC';
  }
  updateTime();
  setInterval(updateTime, 1000);
</script>
</body>
</html>
