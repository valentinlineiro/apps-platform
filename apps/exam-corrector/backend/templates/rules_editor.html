<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reglas de evaluación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #141414; --border: #222;
      --text: #e8e8e8; --muted: #777; --accent: #c8f135;
      --mono: "DM Mono", monospace; --sans: "DM Sans", sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    .layout { max-width: 860px; margin: 0 auto; padding: 60px 24px; }
    .back { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); text-decoration: none; display: inline-flex; gap: 6px; margin-bottom: 26px; }
    .back:hover { color: var(--text); }
    h1 { font-family: var(--mono); font-size: 1rem; margin-bottom: 10px; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; }
    textarea {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--border);
      background: #101010;
      color: var(--text);
      padding: 14px;
      font-family: var(--mono);
      font-size: 0.76rem;
      line-height: 1.55;
    }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    button, .btn {
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-decoration: none;
      cursor: pointer;
    }
    button:hover, .btn:hover { background: var(--accent); color: #000; }
    .msg { font-family: var(--mono); font-size: 0.75rem; margin-top: 10px; }
    .ok { color: #9ddb2a; }
    .err { color: #ff9e9e; }
  </style>
</head>
<body>
  <div class="layout">
    <a class="back" href="/exam-corrector/">← volver a corregir</a>
    <h1>Reglas de evaluación</h1>
    <p class="subtitle">Edita el JSON por tipo de examen. Campos obligatorios: <code>correcta</code>, <code>incorrecta</code>, <code>en_blanco</code>.</p>

    <form method="post" action="/exam-corrector/rules">
      <textarea name="rules_json" spellcheck="false">{{ rules_json }}</textarea>
      <div class="actions">
        <button type="submit">Guardar reglas</button>
        <a class="btn" href="/exam-corrector/">Ir al corrector</a>
      </div>
      {% if success %}
      <p class="msg ok">{{ success }}</p>
      {% endif %}
      {% if error %}
      <p class="msg err">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
