<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Corrector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #141414; --border: #222;
      --text: #e8e8e8; --muted: #777; --accent: #c8f135;
      --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    .layout { max-width: 640px; margin: 0 auto; padding: 60px 24px; }
    .back { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 32px; }
    .back:hover { color: var(--text); }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .rules-link {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 10px;
    }
    .rules-link:hover { color: var(--text); border-color: var(--muted); }
    h1 { font-family: var(--mono); font-size: 1.1rem; font-weight: 500; margin-bottom: 10px; }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.5; }
    .panel { border: 1px solid var(--border); background: var(--surface); padding: 22px; }
    .field { display: grid; gap: 8px; margin-bottom: 16px; }
    .label { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.04em; color: var(--muted); }
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--border);
      background: #101010;
      color: var(--text);
      padding: 10px;
      font-family: var(--sans);
      font-size: 0.88rem;
    }
    select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      background: #101010;
      color: var(--text);
      padding: 10px;
      font-family: var(--sans);
      font-size: 0.88rem;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .check input { accent-color: var(--accent); }
    .hidden { display: none; }
    .actions { display: flex; gap: 10px; margin-top: 10px; }
    button {
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 0.8rem;
      cursor: pointer;
    }
    button:hover { background: var(--accent); color: #000; }
    .status {
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="topbar">
      <a class="back" href="/">← ~/apps</a>
      <a class="rules-link" href="/exam-corrector/rules">configurar reglas</a>
    </div>
    <h1>exam-corrector</h1>
    <p class="subtitle">Sube la plantilla y el examen para comparar marcas y calcular la puntuacion.</p>

    <form id="correction-form" class="panel" action="/exam-corrector/corregir" method="post" enctype="multipart/form-data">
      <div class="field">
        <label class="label" for="template_id">Plantilla guardada</label>
        <select id="template_id" name="template_id">
          <option value="__upload__">Subir nueva plantilla...</option>
          {% for t in templates_guardadas %}
          <option value="{{ t.id }}">{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div id="upload-template-fields" class="field">
        <label class="label" for="plantilla">Nueva plantilla (respuestas correctas)</label>
        <input id="plantilla" type="file" name="plantilla" accept="image/*">
        <input id="template_name" type="text" name="template_name" placeholder="Nombre plantilla (opcional)">
        <label class="check" for="save_template">
          <input id="save_template" type="checkbox" name="save_template" value="1" checked>
          Guardar plantilla para futuros exámenes
        </label>
      </div>

      <div class="field">
        <label class="label" for="examen">Examen (respuestas del alumno)</label>
        <input id="examen" type="file" name="examen" accept="image/*" required>
      </div>

      <div class="actions">
        <button id="submit-btn" type="submit">Corregir examen</button>
      </div>
      <p id="status" class="status"></p>
    </form>
  </div>
  <script>
    const form = document.getElementById("correction-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const templateSelect = document.getElementById("template_id");
    const uploadFields = document.getElementById("upload-template-fields");
    const plantillaInput = document.getElementById("plantilla");

    function syncTemplateMode() {
      const usingSaved = templateSelect.value && templateSelect.value !== "__upload__";
      uploadFields.classList.toggle("hidden", usingSaved);
      plantillaInput.required = !usingSaved;
      if (usingSaved) {
        plantillaInput.value = "";
      }
    }

    templateSelect.addEventListener("change", syncTemplateMode);
    syncTemplateMode();

    async function waitForResult(jobId) {
      while (true) {
        const res = await fetch(`/exam-corrector/status/${jobId}`);
        const data = await res.json();
        if (!res.ok || data.status === "error") {
          throw new Error(data.error || "Error consultando estado");
        }
        if (data.status === "done") {
          window.location.href = data.result_url;
          return;
        }
        const percent = typeof data.progress === "number" ? data.progress : 0;
        const msg = data.message || "Procesando...";
        statusEl.textContent = `${percent}% · ${msg}`;
        await new Promise((r) => setTimeout(r, 1500));
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      statusEl.textContent = "Subiendo imágenes...";
      try {
        const formData = new FormData(form);
        const res = await fetch("/exam-corrector/start", { method: "POST", body: formData });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || "No se pudo iniciar la corrección");
        }
        statusEl.textContent = "2% · Trabajo iniciado...";
        await waitForResult(data.job_id);
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
