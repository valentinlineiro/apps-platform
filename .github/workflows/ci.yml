name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nx-affected:
    name: Lint, Test & Build (affected)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install app dependencies
        run: |
          npm ci --prefix apps/portal &
          npm ci --prefix apps/exam-corrector &
          npm ci --prefix apps/aneca-advisor &
          npm ci --prefix apps/attendance-checker &
          wait

      - name: Derive Nx base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected projects
        run: npx nx affected -t lint --base=$NX_BASE --head=$NX_HEAD

      - name: Test affected projects
        run: npx nx affected -t test --base=$NX_BASE --head=$NX_HEAD

      - name: Build affected projects
        run: npx nx affected -t build --base=$NX_BASE --head=$NX_HEAD

  python-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install portal backend dependencies
        run: pip install -r requirements-dev.txt
        working-directory: apps/portal/backend

      - name: Run portal backend tests
        run: python -m pytest backend/tests -v
        working-directory: apps/portal

      - name: Syntax check exam-corrector backend
        run: python -m compileall backend
        working-directory: apps/exam-corrector

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Run E2E tests
        run: npx nx e2e portal-e2e
        env:
          E2E_USERNAME: demo
          E2E_PASSWORD: demo123

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down
