name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT || github.token }}

      - name: Configure submodule auth
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          if [ -n "$SUBMODULES_PAT" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/portal:latest
            ghcr.io/${{ github.repository }}/portal:${{ github.sha }}
          cache-from: type=gha,scope=portal
          cache-to: type=gha,mode=max,scope=portal

      - name: Build & push portal-backend
        uses: docker/build-push-action@v6
        with:
          context: apps/portal/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/portal-backend:latest
            ghcr.io/${{ github.repository }}/portal-backend:${{ github.sha }}
          cache-from: type=gha,scope=portal-backend
          cache-to: type=gha,mode=max,scope=portal-backend

      - name: Build & push exam-corrector-backend
        uses: docker/build-push-action@v6
        with:
          context: apps/exam-corrector
          file: apps/exam-corrector/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/exam-corrector-backend:latest
            ghcr.io/${{ github.repository }}/exam-corrector-backend:${{ github.sha }}
          cache-from: type=gha,scope=exam-corrector
          cache-to: type=gha,mode=max,scope=exam-corrector

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - name: Checkout (portal submodule for keycloak/postgres files)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init portal submodule
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          if [ -n "$SUBMODULES_PAT" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf "https://github.com/"
          fi
          git submodule update --init --depth 1 apps/portal

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,apps/portal/backend/postgres/,apps/portal/backend/keycloak/"
          target: /opt/apps-platform/

      - name: Pull images & restart
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_REPO: ${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,GHCR_REPO,IMAGE_TAG
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/apps-platform
            GHCR_REPO="$GHCR_REPO" IMAGE_TAG="$IMAGE_TAG" \
              docker compose -f docker-compose.prod.yml pull portal portal-backend exam-corrector-backend
            GHCR_REPO="$GHCR_REPO" IMAGE_TAG="$IMAGE_TAG" \
              docker compose -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
